packages:
  - packages/*

supportedArchitectures:
  os:
    - darwin
    - win32
    - linux
  cpu:
    - x64
    - ia32
    - arm64

allowBuilds:
  esbuild: true
  '@parcel/watcher': false
  electron-winstaller: false

overrides:
  stylus: 'npm:empty-npm-package@1.0.0'
  'esbuild-plugin-inline-worker>esbuild': ^0.25.0

catalog:
  # deltachat specific
  '@deltachat/jsonrpc-client': 2.53.0
  '@deltachat/stdio-rpc-server': 2.53.0
  '@webxdc/types': ^2.1.2
  '@deltachat/calls-webapp': 0.12.1-beta-debug
  mocha: ^11.7.5
  chai: ^6.2.1

  # dependencies
  '@types/mime-types': ^2.1.4
  '@types/ws': ^8.5.12
  mime-types: ^2.1.35
  ws: ^8.18.0

  # tools / dev dependencies
  sass: ^1.86.3
  typescript: ^6.0.3
  typescript-plugin-css-modules: ^5.2.0
  esbuild: ^0.25.0
  '@types/node': ^22.15.33
  '@types/mocha': ^10.0.7
  '@types/chai': ^4.3.17
