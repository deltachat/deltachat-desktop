name: e2e Tests
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**' # only trigger build if a file outside of /docs was changed
      - '_locales/*.xml'
      - '.vscode/**'
      - 'README_ASSETS/**'
      - 'README.md'
  pull_request:
    paths-ignore:
      - 'docs/**' # only trigger build if a file outside of /docs was changed
      - '_locales/*.xml'
      - '.vscode/**'
      - 'README_ASSETS/**'
      - 'README.md'

permissions: {}

jobs:
  test:
    name: E2E Tests
    environment: test
    env:
      CI: true
      NODE_ENV: test
      VERSION_INFO_GIT_REF: ${{ github.ref }}
      DC_CHATMAIL_DOMAIN: 127.0.0.1
      DC_FRONTEND_NO_TLS: true
      DC_MAIL_SERVER: ${{ vars.CI_MAIL_SERVER }}
      DC_MAIL_SERVER_TOKEN: ${{ secrets.CI_MAIL_SERVER_TOKEN }}
    timeout-minutes: 75
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
          persist-credentials: false
      - name: Checkout chatmail Docker setup
        uses: actions/checkout@v6
        with:
          repository: chatmail/docker
          path: .ci/docker
          show-progress: false
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install dependencies
        run: npm install -g pnpm && pnpm install
      - name: Install Playwright Browsers
        working-directory: ./packages/e2e-tests
        run: pnpm exec playwright install --with-deps --only-shell chromium
      - name: Start local chatmail relay
        working-directory: ./.ci/docker
        env:
          CHATMAIL_IMAGE: ghcr.io/chatmail/docker:main
        run: |
          printf 'MAIL_DOMAIN=127.0.0.1\n' > .env
          docker pull "$CHATMAIL_IMAGE"
          docker compose up --no-build -d chatmail
      - name: Wait for chatmail relay
        run: |
          for attempt in {1..60}; do
            status="$(docker inspect --format='{{.State.Health.Status}}' chatmail 2>/dev/null || true)"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi

            if [ "$status" = "unhealthy" ]; then
              docker logs chatmail
              docker exec chatmail get-service-logs || true
              exit 1
            fi

            echo "Waiting for chatmail relay to become healthy (attempt ${attempt}/60, status: ${status:-starting})"
            sleep 10
          done

          docker logs chatmail
          docker exec chatmail get-service-logs || true
          exit 1
      - name: Build browser target
        run: pnpm build:browser
      - name: Run e2e tests (local chatmail relay)
        run: pnpm --filter=e2e-tests e2e
      # Instant onboarding (DCACCOUNT) does not work with self-signed
      # IP-only local relay (see chatmail/core#8211)
      # so we run it against a public chatmail relay instead.
      - name: Run instant onboarding e2e tests (public chatmail relay)
        if: ${{ !cancelled() }}
        run: pnpm --filter=e2e-tests e2e qrcode instant-onboarding
        env:
          DC_CHATMAIL_DOMAIN: ci-chatmail.testrun.org
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report-public
      - name: Collect chatmail logs
        if: ${{ !cancelled() }}
        run: |
          mkdir -p chatmail-logs
          docker logs chatmail > chatmail-logs/docker.log 2>&1 || true
          docker exec chatmail get-service-logs > chatmail-logs/services.log 2>&1 || true
      - name: Stop chatmail relay
        if: ${{ always() }}
        working-directory: ./.ci/docker
        run: docker compose down --volumes
      - uses: actions/upload-artifact@v4
        # We may want to not upload artifacts if tests pass,
        # (`if: ${{ failure() && !cancelled() }}`)
        # but we want to debug flaky tests, so let's always upload them.
        if: ${{ !cancelled() }}
        with:
          name: e2e-report
          path: |
            packages/e2e-tests/playwright-report
            packages/e2e-tests/playwright-report-public
            chatmail-logs
          retention-days: 10
